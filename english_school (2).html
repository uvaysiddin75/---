<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --blue: #1565c0;
    --sky: #42a5f5;
    --gold: #ffd54f;
    --white: #f8faff;
    --card: #162236;
    --correct: #66bb6a;
    --wrong: #ef5350;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-circles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bg-circles span { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(21,101,192,0.18) 0%, transparent 70%); }
  .bg-circles span:nth-child(1){width:600px;height:600px;top:-150px;left:-150px;}
  .bg-circles span:nth-child(2){width:400px;height:400px;bottom:-100px;right:-100px;}
  .bg-circles span:nth-child(3){width:300px;height:300px;top:40%;left:60%;}

  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px;
    background: rgba(13,27,42,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(66,165,245,0.2);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--gold); }
  .logo span { color: var(--sky); }
  .nav-btn {
    background: var(--blue); border: none; color: white;
    padding: 10px 24px; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }
  .nav-btn:hover { background: var(--sky); transform: translateY(-2px); }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* HOME */
  .hero { text-align: center; padding: 80px 20px 60px; }
  .hero-badge {
    display: inline-block;
    background: rgba(66,165,245,0.15); border: 1px solid rgba(66,165,245,0.4);
    color: var(--sky); border-radius: 50px; padding: 6px 20px;
    font-size: .9rem; font-weight: 700; margin-bottom: 20px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p { font-size: 1.15rem; color: #90caf9; max-width: 540px; margin: 0 auto 40px; }
  .hero-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--sky));
    border: none; color: white; padding: 16px 40px; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800;
    cursor: pointer; transition: all .25s; box-shadow: 0 8px 32px rgba(21,101,192,0.4);
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(21,101,192,0.6); }
  .btn-secondary {
    background: transparent; border: 2px solid var(--sky); color: var(--sky);
    padding: 14px 36px; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: all .25s;
  }
  .btn-secondary:hover { background: rgba(66,165,245,0.1); transform: translateY(-3px); }

  .topics-section { padding: 0 40px 80px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 36px; }
  .section-title span { color: var(--gold); }
  .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .topic-card {
    background: var(--card); border: 1px solid rgba(66,165,245,0.15);
    border-radius: var(--radius); padding: 28px 24px; cursor: pointer; transition: all .25s;
    position: relative; overflow: hidden;
  }
  .topic-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--sky));
    transform: scaleX(0); transition: transform .3s; transform-origin: left;
  }
  .topic-card:hover::before { transform: scaleX(1); }
  .topic-card:hover { transform: translateY(-6px); border-color: rgba(66,165,245,0.4); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
  .topic-icon { font-size: 2.4rem; margin-bottom: 14px; }
  .topic-card h3 { font-size: 1.15rem; font-weight: 800; margin-bottom: 8px; }
  .topic-card p { font-size: .9rem; color: #90caf9; line-height: 1.5; }
  .topic-badge { display: inline-block; margin-top: 14px; background: rgba(255,213,79,0.15); color: var(--gold); border: 1px solid rgba(255,213,79,0.3); padding: 3px 12px; border-radius: 50px; font-size: .78rem; font-weight: 700; }

  /* LESSON */
  .lesson-container { max-width: 820px; margin: 0 auto; padding: 40px 20px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(66,165,245,0.1); border: 1px solid rgba(66,165,245,0.3);
    color: var(--sky); padding: 8px 20px; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-size: .9rem; font-weight: 700;
    cursor: pointer; transition: all .2s; margin-bottom: 30px;
  }
  .back-btn:hover { background: rgba(66,165,245,0.2); }
  .lesson-level { color: var(--gold); font-size: .85rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .lesson-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; }
  .lesson-desc { color: #90caf9; font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
  .lesson-content { background: var(--card); border: 1px solid rgba(66,165,245,0.15); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; line-height: 1.9; }
  .lesson-content h4 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); margin: 24px 0 12px; }
  .lesson-content h4:first-child { margin-top: 0; }
  .vocab-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  .vocab-table th { background: rgba(21,101,192,0.3); padding: 10px 16px; text-align: left; font-weight: 800; color: var(--sky); font-size: .9rem; text-transform: uppercase; letter-spacing: 1px; }
  .vocab-table td { padding: 10px 16px; border-bottom: 1px solid rgba(66,165,245,0.1); font-size: .95rem; }
  .vocab-table tr:hover td { background: rgba(66,165,245,0.05); }
  .example-box { background: rgba(21,101,192,0.15); border-left: 3px solid var(--sky); border-radius: 0 8px 8px 0; padding: 14px 18px; margin: 12px 0; font-size: .95rem; color: #e3f2fd; }
  .example-box em { color: var(--gold); font-style: normal; font-weight: 700; }
  .tip-box { background: rgba(255,213,79,0.08); border: 1px solid rgba(255,213,79,0.25); border-radius: 10px; padding: 16px 20px; margin: 16px 0; font-size: .92rem; }
  .tip-box strong { color: var(--gold); }
  .start-test-btn {
    display: block; width: 100%; max-width: 400px; margin: 0 auto;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    border: none; color: white; padding: 18px 40px; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800;
    cursor: pointer; transition: all .25s; text-align: center;
    box-shadow: 0 8px 32px rgba(21,101,192,0.4);
  }
  .start-test-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(21,101,192,0.6); }

  /* TEST */
  .test-container { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
  .test-progress-info { display: flex; justify-content: space-between; font-size: .9rem; color: #90caf9; margin-bottom: 8px; }
  .test-progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 50px; overflow: hidden; margin-bottom: 28px; }
  .test-progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--sky)); border-radius: 50px; transition: width .4s ease; }
  .question-card { background: var(--card); border: 1px solid rgba(66,165,245,0.15); border-radius: var(--radius); padding: 32px; }
  .question-num { color: var(--gold); font-size: .85rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 28px; line-height: 1.5; }
  .options-grid { display: flex; flex-direction: column; gap: 12px; }
  .option-btn {
    background: rgba(255,255,255,0.04); border: 2px solid rgba(66,165,245,0.2);
    color: var(--white); text-align: left; padding: 14px 20px; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 14px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--sky); background: rgba(66,165,245,0.1); transform: translateX(4px); }
  .option-btn .opt-letter { min-width: 32px; height: 32px; border-radius: 50%; background: rgba(66,165,245,0.15); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: .9rem; color: var(--sky); }
  .option-btn.correct { border-color: var(--correct); background: rgba(102,187,106,0.15); }
  .option-btn.correct .opt-letter { background: var(--correct); color: white; }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(239,83,80,0.15); }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: white; }
  .option-btn:disabled { cursor: default; }
  .feedback-msg { margin-top: 18px; padding: 12px 18px; border-radius: 10px; font-weight: 700; font-size: .95rem; display: none; }
  .feedback-msg.show { display: block; }
  .feedback-msg.correct-fb { background: rgba(102,187,106,0.15); border: 1px solid rgba(102,187,106,0.4); color: #a5d6a7; }
  .feedback-msg.wrong-fb { background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.4); color: #ef9a9a; }
  .next-btn { margin-top: 24px; display: none; background: linear-gradient(135deg, var(--blue), var(--sky)); border: none; color: white; width: 100%; padding: 15px; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all .2s; }
  .next-btn:hover { opacity: .9; transform: translateY(-2px); }
  .next-btn.show { display: block; }

  /* RESULTS */
  .results-container { max-width: 640px; margin: 0 auto; padding: 60px 20px; text-align: center; }
  .results-icon { font-size: 5rem; margin-bottom: 20px; }
  .results-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 12px; }
  .results-score { font-size: 5rem; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--sky)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; }
  .results-label { font-size: 1.1rem; color: #90caf9; margin-bottom: 32px; }
  .results-breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 40px; }
  .breakdown-item { background: var(--card); border: 1px solid rgba(66,165,245,0.15); border-radius: 12px; padding: 20px 12px; }
  .breakdown-num { font-size: 1.8rem; font-weight: 900; }
  .breakdown-num.green { color: var(--correct); }
  .breakdown-num.red { color: var(--wrong); }
  .breakdown-num.blue { color: var(--sky); }
  .breakdown-label { font-size: .8rem; color: #90caf9; margin-top: 4px; }
  .results-grade { background: var(--card); border: 1px solid rgba(255,213,79,0.2); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; }
  .grade-label { font-size: .85rem; color: var(--gold); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .grade-text { font-size: 1rem; color: #e3f2fd; line-height: 1.6; }
  .results-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeInUp .5s ease forwards; }
</style>
</head>
<body>
<div class="bg-circles"><span></span><span></span><span></span></div>

<nav>
  <div class="logo">English <span>School</span></div>
  <button class="nav-btn" onclick="showScreen('home')">🏠 Главная</button>
</nav>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="hero fade-in">
    <div class="hero-badge">📚 Уровень A1 — Начинающий</div>
    <h1>Учи <em>английский</em><br>легко и эффективно</h1>
    <p>Изучай основы английского языка по темам A1 и проверяй свои знания тестами из 30 вопросов!</p>
    <div class="hero-btns">
      <button class="btn-primary" onclick="document.querySelector('.topics-section').scrollIntoView({behavior:'smooth'})">📖 Начать учиться</button>
      <button class="btn-secondary" onclick="selectTopic(0); showScreen('lesson')">▶ Первый урок</button>
    </div>
  </div>
  <div class="topics-section">
    <h2 class="section-title">Темы уровня <span>A1</span></h2>
    <div class="topics-grid" id="topics-grid"></div>
  </div>
</div>

<!-- LESSON -->
<div id="screen-lesson" class="screen">
  <div class="lesson-container">
    <button class="back-btn" onclick="showScreen('home')">← Назад к темам</button>
    <div id="lesson-content-area"></div>
    <button class="start-test-btn" onclick="startTest()">📝 Пройти тест (30 вопросов) →</button>
  </div>
</div>

<!-- TEST -->
<div id="screen-test" class="screen">
  <div class="test-container">
    <button class="back-btn" onclick="showScreen('lesson')">← Вернуться к уроку</button>
    <div class="test-progress-info">
      <span id="q-count">Вопрос 1 из 30</span>
      <span id="q-score-live">✅ 0</span>
    </div>
    <div class="test-progress-bar">
      <div class="test-progress-fill" id="progress-fill" style="width:3.33%"></div>
    </div>
    <div class="question-card fade-in" id="question-card">
      <div class="question-num" id="q-num">ВОПРОС 1</div>
      <div class="question-text" id="q-text"></div>
      <div class="options-grid" id="options-container"></div>
      <div class="feedback-msg" id="feedback-msg"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Следующий вопрос →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="screen-results" class="screen">
  <div class="results-container fade-in">
    <div class="results-icon" id="r-icon"></div>
    <div class="results-title" id="r-title"></div>
    <div class="results-score" id="r-score"></div>
    <div class="results-label" id="r-label"></div>
    <div class="results-breakdown">
      <div class="breakdown-item"><div class="breakdown-num green" id="r-correct">0</div><div class="breakdown-label">✅ Правильно</div></div>
      <div class="breakdown-item"><div class="breakdown-num red" id="r-wrong">0</div><div class="breakdown-label">❌ Неправильно</div></div>
      <div class="breakdown-item"><div class="breakdown-num blue" id="r-pct">0%</div><div class="breakdown-label">📊 Результат</div></div>
    </div>
    <div class="results-grade">
      <div class="grade-label">💬 Комментарий</div>
      <div class="grade-text" id="r-comment"></div>
    </div>
    <div class="results-btns">
      <button class="btn-primary" onclick="startTest()">🔄 Пройти снова</button>
      <button class="btn-secondary" onclick="showScreen('home')">📚 Другие темы</button>
    </div>
  </div>
</div>

<script>
const topics = [
  {
    icon:'👋', title:'Приветствия и знакомство', desc:'Hello, Hi, Good morning — как познакомиться на английском', badge:'A1 • Урок 1',
    lessonTitle:'Greetings & Introductions', lessonDesc:'Учимся здороваться, прощаться и рассказывать о себе по-английски.',
    content:`
      <h4>🗣️ Приветствия (Greetings)</h4>
      <table class="vocab-table"><tr><th>Английский</th><th>Русский</th><th>Произношение</th></tr>
      <tr><td><b>Hello / Hi</b></td><td>Привет</td><td>[хэлоу / хай]</td></tr>
      <tr><td><b>Good morning</b></td><td>Доброе утро</td><td>[гуд морнинг]</td></tr>
      <tr><td><b>Good afternoon</b></td><td>Добрый день</td><td>[гуд афтэнун]</td></tr>
      <tr><td><b>Good evening</b></td><td>Добрый вечер</td><td>[гуд ивнинг]</td></tr>
      <tr><td><b>Goodbye / Bye</b></td><td>До свидания</td><td>[гудбай / бай]</td></tr>
      <tr><td><b>Good night</b></td><td>Спокойной ночи</td><td>[гуд найт]</td></tr></table>
      <h4>🤝 Знакомство (Introductions)</h4>
      <div class="example-box">— <em>What's your name?</em> — Как тебя зовут?<br>— <em>My name is Anna.</em> — Меня зовут Анна.</div>
      <div class="example-box">— <em>How are you?</em> — Как дела?<br>— <em>I'm fine, thank you!</em> — Хорошо, спасибо!</div>
      <div class="example-box"><em>Nice to meet you!</em> — Приятно познакомиться!<br><em>Nice to meet you too!</em> — Взаимно!</div>
      <h4>🌍 Откуда ты?</h4>
      <div class="example-box"><em>Where are you from?</em> — Откуда ты?<br><em>I'm from Russia / Uzbekistan.</em> — Я из России / Узбекистана.</div>
      <div class="tip-box"><strong>💡 Совет:</strong> Используй "Hello" в официальных ситуациях, "Hi" — с друзьями. "Good morning" до 12:00, "Good afternoon" с 12–18:00, "Good evening" после 18:00.</div>`,
    questions:[
      {q:'Как сказать "Привет" по-английски?',opts:['Hello','Goodbye','Morning','Sleep'],a:0},
      {q:'Что означает "Good morning"?',opts:['Добрый вечер','Доброй ночи','Доброе утро','Добрый день'],a:2},
      {q:'Как спросить "Как тебя зовут?"',opts:['How are you?','What is your name?','Where are you from?','How old are you?'],a:1},
      {q:'Что означает "Nice to meet you"?',opts:['Пока!','Приятно познакомиться','Спокойной ночи','Как дела?'],a:1},
      {q:'Как ответить на "How are you?"',opts:["I'm fine, thank you","My name is Tom","I'm from London","Good night"],a:0},
      {q:'Что означает "Goodbye"?',opts:['Привет','Доброе утро','До свидания','Спасибо'],a:2},
      {q:'Как сказать "Я из России"?',opts:["I'm from France","I'm from Russia","My name is Russia","I live Russia"],a:1},
      {q:'Какое приветствие используют вечером?',opts:['Good morning','Good afternoon','Good evening','Good night'],a:2},
      {q:'Что означает "Good night"?',opts:['Доброй ночи','Привет','Добрый день','До свидания'],a:0},
      {q:'"Hi" — это формальное или неформальное приветствие?',opts:['Формальное','Неформальное','Официальное','Деловое'],a:1},
      {q:'Как сказать "Меня зовут Анна"?',opts:['My name Anna','I name is Anna','My name is Anna','Name me Anna'],a:2},
      {q:'Что означает "Where are you from?"',opts:['Как тебя зовут?','Сколько тебе лет?','Как дела?','Откуда ты?'],a:3},
      {q:'Какое приветствие используют с 12:00 до 18:00?',opts:['Good morning','Good afternoon','Good evening','Good night'],a:1},
      {q:'"Nice to meet you too" означает:',opts:['Пока','Взаимно','Приятно','Спасибо'],a:1},
      {q:'Как коротко сказать "До свидания"?',opts:['Hi','Bye','Hey','Oh'],a:1},
      {q:'Что значит "I\'m fine"?',opts:['Я болен','Я устал','Я хорошо','Я плохо'],a:2},
      {q:'Как по-английски "Добрый день"?',opts:['Good morning','Good afternoon','Good evening','Good day'],a:1},
      {q:'Правильный ответ на "What\'s your name?":',opts:['I\'m from London','I\'m 10 years old','My name is Alex','I am fine'],a:2},
      {q:'Что означает "Good evening"?',opts:['Доброе утро','Добрый день','Добрый вечер','Доброй ночи'],a:2},
      {q:'Как по-английски "Спокойной ночи"?',opts:['Good morning','Goodnight','Good evening','Goodbye'],a:1},
      {q:'"Hello" используется в ситуациях:',opts:['Только утром','Только вечером','В любое время','Только с друзьями'],a:2},
      {q:'Как сказать "Приятно познакомиться"?',opts:['How are you?','Nice to meet you','Good to see you','Hello there'],a:1},
      {q:'Что значит "thank you"?',opts:['Пожалуйста','Извините','Спасибо','Привет'],a:2},

let currentTopicIndex = 0;
let currentQuestions = [];
let currentQIndex = 0;
let score = 0;
let answered = false;

function buildTopics() {
  const grid = document.getElementById('topics-grid');
  topics.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `<div class="topic-icon">${t.icon}</div><h3>${t.title}</h3><p>${t.desc}</p><span class="topic-badge">${t.badge}</span>`;
    card.onclick = () => { selectTopic(i); showScreen('lesson'); };
    grid.appendChild(card);
  });
}

function selectTopic(index) {
  currentTopicIndex = index;
  const t = topics[index];
  document.getElementById('lesson-content-area').innerHTML = `
    <div class="lesson-level">A1 • ${t.badge.split('•')[1].trim()}</div>
    <div class="lesson-title">${t.icon} ${t.lessonTitle}</div>
    <div class="lesson-desc">${t.lessonDesc}</div>
    <div class="lesson-content">${t.content}</div>`;
}

function startTest() {
  currentQuestions = [...topics[currentTopicIndex].questions].sort(() => Math.random() - 0.5).slice(0, 30);
  currentQIndex = 0; score = 0; answered = false;
  showScreen('test');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = currentQuestions[currentQIndex];
  const pct = Math.max(3.33, (currentQIndex / 30) * 100);
  document.getElementById('q-count').textContent = `Вопрос ${currentQIndex + 1} из 30`;
  document.getElementById('q-score-live').textContent = `✅ ${score}`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = `ВОПРОС ${currentQIndex + 1}`;
  document.getElementById('q-text').textContent = q.q;
  const letters = ['A','B','C','D'];
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => checkAnswer(i, q.a);
    container.appendChild(btn);
  });
  document.getElementById('feedback-msg').className = 'feedback-msg';
  document.getElementById('next-btn').className = 'next-btn';
  const card = document.getElementById('question-card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'fadeInUp .4s ease forwards';
}

function checkAnswer(selected, correct) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  btns[correct].classList.add('correct');
  const fb = document.getElementById('feedback-msg');
  if (selected === correct) {
    score++;
    document.getElementById('q-score-live').textContent = `✅ ${score}`;
    btns[selected].classList.add('correct');
    fb.textContent = '✅ Правильно! Отлично!';
    fb.className = 'feedback-msg correct-fb show';
  } else {
    btns[selected].classList.add('wrong');
    fb.textContent = `❌ Неправильно. Правильный ответ: ${currentQuestions[currentQIndex].opts[correct]}`;
    fb.className = 'feedback-msg wrong-fb show';
  }
  const nb = document.getElementById('next-btn');
  nb.textContent = currentQIndex + 1 >= 30 ? '🏆 Показать результат' : 'Следующий вопрос →';
  nb.className = 'next-btn show';
}

function nextQuestion() {
  currentQIndex++;
  if (currentQIndex >= 30) showResults(); else renderQuestion();
}

function showResults() {
  const pct = Math.round(score / 30 * 100);
  const wrong = 30 - score;
  let icon, title, comment;
  if (pct >= 90) { icon='🏆'; title='Превосходно!'; comment='Вы великолепно знаете эту тему! Переходите к следующему уроку.'; }
  else if (pct >= 70) { icon='🌟'; title='Хорошо!'; comment='Отличный результат! Повторите несколько слов, которые вызвали трудности.'; }
  else if (pct >= 50) { icon='👍'; title='Неплохо!'; comment='Вы на верном пути! Перечитайте урок и пройдите тест снова для закрепления.'; }
  else { icon='💪'; title='Не сдавайся!'; comment='Вернитесь к уроку, выучите новые слова и попробуйте снова!'; }
  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-score').textContent = `${score}/30`;
  document.getElementById('r-label').textContent = `Тема: ${topics[currentTopicIndex].title}`;
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-pct').textContent = pct + '%';
  document.getElementById('r-comment').textContent = comment;
  showScreen('results');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

buildTopics();
</script>
